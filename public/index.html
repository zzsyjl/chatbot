<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 模型对比 - Multi-LLM Arena</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">对话历史</span>
                <button class="new-chat-btn" id="newChatBtn">+ 新对话</button>
            </div>
            <div class="chat-history" id="chatHistory"></div>
        </aside>

        <div class="main-area">
            <header class="app-header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggle" title="切换侧边栏">☰</button>
                    <h1 class="app-title">AI 模型对比</h1>
                    <span class="app-subtitle">同一问题，多模型并行回答</span>
                </div>
                <div class="header-right">
                    <label class="search-toggle-label" for="searchToggle">
                        <input type="checkbox" id="searchToggle" class="search-toggle-checkbox">
                        <span class="search-toggle-slider"></span>
                        <span class="search-toggle-text">联网搜索</span>
                    </label>
                    <button class="clear-btn" id="clearBtn" title="清空当前对话">清空</button>
                </div>
            </header>

            <div class="columns-container" id="columnsContainer">
                <div class="model-column" data-slot="0">
                    <div class="column-header provider-deepseek">
                        <select class="provider-select" data-slot="0">
                            <option value="deepseek" selected>DeepSeek</option>
                            <option value="openai">OpenAI</option>
                            <option value="anthropic">Anthropic</option>
                            <option value="google">Google</option>
                            <option value="minimax">MiniMax</option>
                            <option value="zhipu">智谱GLM</option>
                            <option value="qwen">通义千问</option>
                        </select>
                        <select class="model-select" data-slot="0">
                            <option value="deepseek-chat">DeepSeek Chat</option>
                            <option value="deepseek-reasoner">DeepSeek Reasoner</option>
                        </select>
                    </div>
                    <div class="column-chat" data-slot="0">
                        <div class="empty-state"><div class="empty-icon">🔮</div><p>等待提问...</p></div>
                    </div>
                </div>

                <div class="model-column" data-slot="1">
                    <div class="column-header provider-openai">
                        <select class="provider-select" data-slot="1">
                            <option value="deepseek">DeepSeek</option>
                            <option value="openai" selected>OpenAI</option>
                            <option value="anthropic">Anthropic</option>
                            <option value="google">Google</option>
                            <option value="minimax">MiniMax</option>
                            <option value="zhipu">智谱GLM</option>
                            <option value="qwen">通义千问</option>
                        </select>
                        <select class="model-select" data-slot="1">
                            <option value="gpt-5.4">GPT-5.4</option>
                            <option value="gpt-4o">GPT-4o</option>
                            <option value="gpt-4o-mini">GPT-4o Mini</option>
                        </select>
                    </div>
                    <div class="column-chat" data-slot="1">
                        <div class="empty-state"><div class="empty-icon">🤖</div><p>等待提问...</p></div>
                    </div>
                </div>

                <div class="model-column" data-slot="2">
                    <div class="column-header provider-anthropic">
                        <select class="provider-select" data-slot="2">
                            <option value="deepseek">DeepSeek</option>
                            <option value="openai">OpenAI</option>
                            <option value="anthropic" selected>Anthropic</option>
                            <option value="google">Google</option>
                            <option value="minimax">MiniMax</option>
                            <option value="zhipu">智谱GLM</option>
                            <option value="qwen">通义千问</option>
                        </select>
                        <select class="model-select" data-slot="2">
                            <option value="claude-opus-4.6">Claude Opus 4.6</option>
                            <option value="claude-sonnet-4">Claude Sonnet 4</option>
                            <option value="claude-3.5-haiku">Claude 3.5 Haiku</option>
                        </select>
                    </div>
                    <div class="column-chat" data-slot="2">
                        <div class="empty-state"><div class="empty-icon">🧠</div><p>等待提问...</p></div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="输入问题，同时向三个模型提问..." rows="1"></textarea>
                    <button id="sendBtn" class="send-btn">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M3 10L17 3L11 10L17 17L3 10Z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
